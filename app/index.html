<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>試験アプリ</title>
    <meta name="theme-color" content="#136f63">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Exam Dashboard</p>
          <h1 id="appTitle">試験アプリ</h1>
        </div>
        <button class="secondary-button compact" id="dashboardButton" type="button">ダッシュボード</button>
      </header>

      <section class="dashboard-view" id="dashboardView" aria-label="ダッシュボード">
        <div class="metric-grid">
          <article class="metric-panel">
            <span class="metric-label">問題集</span>
            <strong id="setCount">0</strong>
          </article>
          <article class="metric-panel">
            <span class="metric-label">総問題数</span>
            <strong id="questionTotal">0</strong>
          </article>
          <article class="metric-panel">
            <span class="metric-label">平均正答率</span>
            <strong id="averageScore">-</strong>
          </article>
        </div>

        <section class="panel">
          <div class="section-header">
            <div>
              <p class="eyebrow">Workbook</p>
              <h2>問題集を選択</h2>
            </div>
          </div>
          <div class="set-manager">
            <label class="field-label">
              実施する問題集
              <select id="setSelect"></select>
            </label>
            <p class="set-meta" id="activeSetMeta"></p>
            <div class="set-actions">
              <label class="field-label">
                問題集名
                <input id="setNameInput" type="text" autocomplete="off" placeholder="問題集名を入力">
              </label>
              <div class="set-action-buttons">
                <button class="secondary-button" id="renameSetButton" type="button">名前を保存</button>
                <button class="primary-button" id="createSetButton" type="button">新規作成</button>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="section-header">
            <div>
              <p class="eyebrow">Start</p>
              <h2>実施モード</h2>
            </div>
          </div>
          <div class="start-panel">
            <label class="field-label">
              採点方式
              <select id="examModeSelect">
                <option value="batch">一括採点</option>
                <option value="instant" selected>都度採点</option>
                <option value="resume">中断したところから再開</option>
              </select>
            </label>
            <div class="flag-filter-panel">
              <span class="option-label">対象フラグ</span>
              <div class="flag-filter-grid">
                <label class="option-row flag-option flag-circle">
                  <input name="targetFlag" type="checkbox" value="circle">
                  <span>〇</span>
                </label>
                <label class="option-row flag-option flag-triangle">
                  <input name="targetFlag" type="checkbox" value="triangle">
                  <span>△</span>
                </label>
                <label class="option-row flag-option flag-cross">
                  <input name="targetFlag" type="checkbox" value="cross">
                  <span>×</span>
                </label>
              </div>
            </div>
            <div class="option-grid">
              <label class="option-row">
                <input id="shuffleChoicesOption" type="checkbox">
                <span>選択肢をシャッフル</span>
              </label>
              <label class="option-row">
                <input id="shuffleQuestionsOption" type="checkbox">
                <span>問題順をランダム</span>
              </label>
            </div>
            <label class="field-label">
              実施する問題数
              <input id="questionLimitInput" type="number" min="1" step="1" inputmode="numeric" placeholder="未入力なら全問">
            </label>
            <button class="primary-button" id="startExamButton" type="button">スタート</button>
          </div>
        </section>

        <section class="panel">
          <div class="section-header">
            <div>
              <p class="eyebrow">Tools</p>
              <h2>管理</h2>
            </div>
          </div>
          <div class="tool-grid">
            <button class="secondary-button" id="openEditButton" type="button">問題を編集</button>
            <button class="secondary-button" id="openHistoryButton" type="button">履歴を見る</button>
          </div>
        </section>

        <section class="panel">
          <div class="section-header">
            <div>
              <p class="eyebrow">Data</p>
              <h2>インポート/エクスポート</h2>
            </div>
          </div>
          <div class="tool-grid">
            <button class="secondary-button" id="importDataButton" type="button">インポート</button>
            <button class="secondary-button" id="exportDataButton" type="button">全件エクスポート</button>
            <button class="secondary-button wide-action" id="exportActiveSetButton" type="button">選択中の問題集だけエクスポート</button>
            <input class="hidden-file" id="importDataInput" type="file" accept="application/json,.json">
          </div>
        </section>
      </section>

      <section class="exam-view hidden" id="examView" aria-label="試験">
        <section class="status-panel">
          <div class="progress-meta">
            <span id="questionCounter">問題 0 / 0</span>
            <span id="answeredCounter">0 問回答済み</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="question-nav" id="questionNav" aria-label="問題一覧"></div>
        </section>

        <section class="exam-card" id="examCard" aria-live="polite"></section>

        <section class="controls">
          <button class="icon-button" id="prevButton" type="button" aria-label="前の問題">←</button>
          <button class="primary-button" id="gradeButton" type="button">採点する</button>
          <button class="secondary-button" id="pauseButton" type="button">中断</button>
          <button class="icon-button" id="nextButton" type="button" aria-label="次の問題">→</button>
        </section>

        <section class="summary-panel hidden" id="summaryPanel">
          <div>
            <p class="eyebrow">Result</p>
            <h2 id="resultTitle">結果</h2>
          </div>
          <p id="resultDetail"></p>
          <div class="summary-actions">
            <button class="secondary-button" id="reviewButton" type="button">見直す</button>
            <button class="danger-button" id="finishButton" type="button">結果を保存して終了</button>
          </div>
        </section>
      </section>

      <section class="editor-view hidden" id="editorView" aria-label="問題編集">
        <section class="panel">
          <div class="section-header">
            <div>
              <p class="eyebrow">Editor</p>
              <h2>問題の編集</h2>
            </div>
            <button class="secondary-button compact" id="addQuestionButton" type="button">追加</button>
          </div>
          <div class="editor-layout">
            <div class="editor-list" id="editorList"></div>
            <form class="editor-form" id="editorForm">
              <label>
                問題文
                <textarea id="editQuestionText" rows="5"></textarea>
              </label>
              <div class="choice-editor" id="choiceEditor"></div>
              <label>
                解説
                <textarea id="editExplanation" rows="8"></textarea>
              </label>
              <div class="summary-actions">
                <button class="primary-button" type="submit">保存</button>
                <button class="danger-button" id="deleteQuestionButton" type="button">削除</button>
              </div>
            </form>
          </div>
        </section>
      </section>

      <section class="history-view hidden" id="historyView" aria-label="履歴">
        <section class="panel">
          <div class="section-header">
            <div>
              <p class="eyebrow">History</p>
              <h2>過去の履歴</h2>
            </div>
            <button class="danger-button compact" id="clearHistoryButton" type="button">履歴削除</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
